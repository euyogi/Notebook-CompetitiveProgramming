name: Build PDF

on:
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "update_toc.py"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update TOC
        run: python3 update_toc.py

      - name: Build PDF
        run: |
          npx md-to-pdf README.md --launch-options '{ "args": ["--no-sandbox", "--disable-setuid-sandbox"] }'
          mv README.pdf notebook.pdf

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update notebook.pdf and README.md"
          file_pattern: "notebook.pdf README.md"
          commit_user_name: "GitHub Actions"
          commit_user_email: "actions@github.com"
          commit_author: "GitHub Actions <actions@github.com>"
